<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Faculty Login</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <style>
    /* Responsive adjustments for mobile/tablet */
    @media (max-width: 600px) {
      .login-box {
        padding: 1.2rem 0.7rem 1.2rem;
        border-radius: 14px;
        max-width: 98vw;
      }

      h2 {
        font-size: 1.2rem;
      }

      .field input,
      .password-wrapper input {
        font-size: 1rem;
        min-height: 44px;
      }

      button[type=submit],
      .toggle-pass {
        font-size: 1rem;
        min-height: 44px;
        min-width: 44px;
      }

      .options-row {
        flex-direction: column;
        gap: 0.5rem;
        align-items: flex-start;
      }
    }

    @media (max-width: 430px) {
      .login-box {
        padding: 0.7rem 0.2rem 0.7rem;
        border-radius: 10px;
      }

      h2 {
        font-size: 1rem;
      }
    }

    /* Accessibility: focus styles, ARIA, contrast */
    input:focus,
    button:focus,
    .toggle-pass:focus {
      outline: 2px solid #2563eb;
      outline-offset: 2px;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, .18);
    }

    button[type=submit],
    .toggle-pass {
      touch-action: manipulation;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 12% 20%, rgba(34, 211, 238, 0.56), transparent 20%),
        radial-gradient(circle at 84% 18%, rgba(168, 85, 247, 0.46), transparent 22%),
        radial-gradient(circle at 78% 80%, rgba(16, 185, 129, 0.40), transparent 24%),
        linear-gradient(135deg, #07111f 0%, #0f2a4a 38%, #123d57 62%, #1d1740 100%);
      background-size: 220% 220%;
      animation: loginBaseDrift 18s ease-in-out infinite alternate;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1rem;
      position: relative;
      isolation: isolate;
      overflow: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: -18vh -12vw;
      pointer-events: none;
      z-index: 0;
    }

    body::before {
      background:
        radial-gradient(circle at 18% 18%, rgba(255, 255, 255, 0.5), transparent 14%),
        radial-gradient(circle at 24% 28%, rgba(34, 211, 238, 0.68), transparent 12%),
        radial-gradient(circle at 82% 22%, rgba(168, 85, 247, 0.6), transparent 16%),
        radial-gradient(circle at 78% 80%, rgba(16, 185, 129, 0.56), transparent 14%),
        radial-gradient(circle at 14% 82%, rgba(249, 115, 22, 0.38), transparent 18%),
        radial-gradient(circle at 50% 52%, rgba(59, 130, 246, 0.28), transparent 32%);
      filter: blur(30px) saturate(190%);
      opacity: 0.98;
      animation: loginBgFloat 12s ease-in-out infinite alternate, loginHueShift 14s linear infinite;
      transform-origin: center;
    }

    body::after {
      background:
        conic-gradient(from 180deg at 50% 50%, rgba(255, 255, 255, 0.1), rgba(34, 211, 238, 0.18), rgba(168, 85, 247, 0.16), rgba(16, 185, 129, 0.18), rgba(255, 255, 255, 0.1));
      background-size: 140% 140%;
      opacity: 0.24;
      mix-blend-mode: screen;
      animation: loginBgGrid 14s linear infinite, loginPulse 5s ease-in-out infinite;
    }

    @keyframes loginBgFloat {
      0% {
        transform: translate3d(-1.5%, -1%, 0) scale(1);
      }

      100% {
        transform: translate3d(1.5%, 1%, 0) scale(1.05);
      }
    }

    @keyframes loginBgGrid {
      0% {
        transform: translate3d(-2%, -1%, 0) rotate(0deg) scale(1);
      }

      100% {
        transform: translate3d(2%, 1%, 0) rotate(12deg) scale(1.08);
      }
    }

    @keyframes loginHueShift {
      0% {
        filter: blur(30px) saturate(190%) hue-rotate(0deg);
      }

      100% {
        filter: blur(30px) saturate(190%) hue-rotate(360deg);
      }
    }

    @keyframes loginPulse {
      0%, 100% {
        opacity: 0.18;
        transform: scale(1);
      }

      50% {
        opacity: 0.36;
        transform: scale(1.12);
      }
    }

    @keyframes loginBaseDrift {
      0% {
        background-position: 0% 50%;
      }

      100% {
        background-position: 100% 50%;
      }
    }

    .login-box {
      background: rgba(255, 255, 255, 0.55);
      border: 1px solid rgba(255, 255, 255, 0.65);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      padding: 2.2rem 2rem 2rem;
      border-radius: 18px;
      box-shadow: 0 12px 32px -10px rgba(15, 23, 42, 0.35), 0 6px 20px -8px rgba(15, 23, 42, 0.24);
      width: 100%;
      max-width: 420px;
      position: relative;
      overflow: hidden;
      z-index: 1;
    }

    .login-box:before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 85% 15%, rgba(59, 130, 246, .18), transparent 60%),
        radial-gradient(circle at 10% 90%, rgba(16, 185, 129, .15), transparent 65%);
      pointer-events: none;
      z-index: -1;
    }

    h2 {
      margin: 0 0 1.2rem;
      text-align: center;
      font-weight: 600;
      color: #1e3a8a;
      letter-spacing: .5px;
    }

    form {
      margin: 0;
    }

    label {
      display: block;
      margin: 0 0 .45rem;
      font-weight: 600;
      font-size: .9rem;
      color: #374151;
    }

    .field {
      margin-bottom: 1.05rem;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: .75rem .9rem;
      border: 1.5px solid #cbd5e1;
      border-radius: 8px;
      font-size: .95rem;
      transition: .18s border-color, .18s box-shadow;
      background: rgba(248, 250, 252, 0.92);
    }

    input:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, .25);
      background: #fff;
    }

    .password-wrapper {
      position: relative;
    }

    .toggle-pass {
      position: absolute;
      top: 50%;
      right: .6rem;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      padding: .35rem;
      color: #475569;
      font-size: .8rem;
      line-height: 1;
      border-radius: 6px;
    }

    .toggle-pass:hover {
      background: #f1f5f9;
    }

    .caps-hint {
      display: none;
      font-size: .7rem;
      color: #dc2626;
      margin-top: .25rem;
      font-weight: 500;
      letter-spacing: .5px;
    }

    .options-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: -.25rem 0 1rem;
      font-size: .8rem;
    }

    .checkbox-group {
      display: flex;
      align-items: center;
      gap: .4rem;
      user-select: none;
    }

    .checkbox-group input {
      margin: 0;
    }

    button[type=submit] {
      width: 100%;
      padding: .85rem 1rem;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: .5px;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .55rem;
      transition: background-color .18s, transform .18s;
    }

    button[type=submit]:hover {
      background: #1d4ed8;
    }

    button[type=submit]:active {
      transform: translateY(1px);
    }

    button[disabled] {
      opacity: .65;
      cursor: wait;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 3px solid #ffffff66;
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .error,
    .success {
      margin-top: 1rem;
      text-align: center;
      font-size: .85rem;
      font-weight: 500;
      min-height: 1.1rem;
    }

    .error {
      color: #dc2626;
    }

    .success {
      color: #059669;
    }

    .footer-note {
      margin-top: 1.5rem;
      text-align: center;
      font-size: .7rem;
      color: #64748b;
      letter-spacing: .4px;
    }

    .redirect-info {
      margin-top: 0.5rem;
      text-align: center;
      font-size: .75rem;
      color: #6b7280;
      background: rgba(241, 245, 249, 0.72);
      padding: 0.5rem;
      border-radius: 6px;
    }

    @media (max-width: 430px) {
      .login-box {
        padding: 1.6rem 1.3rem 1.4rem;
      }
    }
  </style>
</head>

<body>
  <div class="login-box" role="form" aria-labelledby="loginTitle">
    <h2 id="loginTitle">Faculty Control Login</h2>
    <form id="loginForm" novalidate aria-label="Login Form">
      <div class="field">
        <label for="username">Username</label>
        <input autocomplete="username" autofocus id="username" type="text" required aria-required="true"
          aria-label="Username" />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <div class="password-wrapper">
          <input autocomplete="current-password" id="password" type="password" required aria-required="true"
            aria-label="Password" />
          <button type="button" class="toggle-pass" id="togglePass" aria-label="Show password">Show</button>
        </div>
        <div id="capsHint" class="caps-hint">CAPS LOCK IS ON</div>
      </div>
      <div class="options-row">
        <label class="checkbox-group">
          <input type="checkbox" id="showPassChk" aria-label="Show Password" /> <span>Show Password</span>
        </label>
        <label class="checkbox-group">
          <input type="checkbox" id="rememberChk" aria-label="Remember Username" /> <span>Remember</span>
        </label>
      </div>
      <button id="loginBtn" type="submit" aria-label="Login">
        <span id="btnText">Login</span>
      </button>
      <div class="error" id="errorMsg" aria-live="assertive"></div>
      <div class="success" id="successMsg" aria-live="polite"></div>
      <div id="redirectInfo" class="redirect-info hidden"></div>
      <div class="footer-note">Token-based secure access (supports multiple concurrent users).</div>
    </form>
  </div>

  <script>
    const form = document.getElementById("loginForm");
    const usernameEl = document.getElementById("username");
    const passwordEl = document.getElementById("password");
    const loginBtn = document.getElementById("loginBtn");
    const btnText = document.getElementById("btnText");
    const errorMsg = document.getElementById("errorMsg");
    const successMsg = document.getElementById("successMsg");
    const redirectInfo = document.getElementById("redirectInfo");
    const showPassChk = document.getElementById("showPassChk");
    const togglePassBtn = document.getElementById("togglePass");
    const capsHint = document.getElementById("capsHint");

    // Get redirect destination from URL parameters or referrer
    function getRedirectDestination() {
      const urlParams = new URLSearchParams(window.location.search);
      const redirectParam = urlParams.get('redirect');
      
      // Check URL parameter first (highest priority)
      if (redirectParam === 'admin') {
        return 'admin';
      }
      
      // Check if we came from admin page (second priority)
      if (document.referrer) {
        try {
          const referrerUrl = new URL(document.referrer);
          if (referrerUrl.pathname.includes('/admin')) {
            return 'admin';
          }
        } catch (e) {
          console.log('Referrer parsing failed:', e);
        }
      }
      
      // Default to admin panel (legacy standalone control page has been removed)
      return 'admin';
    }

    // Show redirect information
    function showRedirectInfo() {
      const destination = getRedirectDestination();
      const destinationName = destination === 'admin' ? 'Admin Panel' : 'Control Panel';
      redirectInfo.textContent = `Will redirect to: ${destinationName}`;
      redirectInfo.classList.remove('hidden');
    }

    // Redirect if already logged in
    document.addEventListener("DOMContentLoaded", () => {
      showRedirectInfo();
      
      // Check if JWT token exists and is valid
      const token = localStorage.getItem('faculty_jwt_token');
      if (token) {
        fetch("https://faculty-status-display.onrender.com/api/check-login", {
          headers: {
            'Authorization': `Bearer ${token}`
          }
        })
          .then(r => r.ok ? r.json() : Promise.reject())
          .then(d => {
            if (d.loggedIn) {
              const destination = getRedirectDestination();
              window.location.href = destination;
            }
          })
          .catch(() => {
            // Token invalid or expired, remove it
            localStorage.removeItem('faculty_jwt_token');
          });
      }
        
      if (localStorage.getItem("fsu_remember_user")) {
        usernameEl.value = localStorage.getItem("fsu_remember_user");
      }
    });

    function setLoading(state) {
      if (state) {
        loginBtn.disabled = true;
        btnText.innerHTML = '<div class="spinner" aria-hidden="true"></div>Authenticating';
      } else {
        loginBtn.disabled = false;
        btnText.textContent = 'Login';
      }
    }

    function showError(msg) {
      errorMsg.textContent = msg || "";
    }

    function showSuccess(msg) {
      successMsg.textContent = msg || "";
    }

    function togglePasswordVisibility(explicit) {
      const show = explicit !== undefined ? explicit : passwordEl.type === "password";
      passwordEl.type = show ? "text" : "password";
      togglePassBtn.textContent = show ? "Hide" : "Show";
      togglePassBtn.setAttribute("aria-label", show ? "Hide password" : "Show password");
      showPassChk.checked = show;
    }

    togglePassBtn.addEventListener("click", () => togglePasswordVisibility());
    showPassChk.addEventListener("change", e => togglePasswordVisibility(e.target.checked));

    passwordEl.addEventListener("keyup", e => {
      const caps = e.getModifierState && e.getModifierState("CapsLock");
      capsHint.style.display = caps ? "block" : "none";
    });

    form.addEventListener("submit", e => {
      e.preventDefault();
      showError("");
      showSuccess("");
      const username = usernameEl.value.trim();
      const password = passwordEl.value.trim();
      if (!username || !password) {
        showError("Enter username and password.");
        return;
      }
      if (document.getElementById("rememberChk").checked) {
        localStorage.setItem("fsu_remember_user", username);
      } else {
        localStorage.removeItem("fsu_remember_user");
      }
      
      const destination = getRedirectDestination();
      setLoading(true);
      
      fetch("https://faculty-status-display.onrender.com/api/auth/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password })
      })
        .then(res => {
          if (res.ok) {
            return res.json();
          } else {
            throw new Error("Invalid credentials");
          }
        })
        .then(data => {
          // Store JWT token in localStorage
          localStorage.setItem('faculty_jwt_token', data.token);
          
          // Don't store destination preference - let each login be independent
          showSuccess(`Login successful. Redirecting to ${destination === 'admin' ? 'Admin Panel' : 'Control Panel'}...`);
          setTimeout(() => window.location.href = destination, 600);
        })
        .catch((error) => {
          showError(error.message || "Network error. Try again.");
        })
        .finally(() => setLoading(false));
    });
  </script>
</body>

</html>
